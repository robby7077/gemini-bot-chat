<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AI Chatbot</title>

  <style>

    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 30px;
    }

    .chat-container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    #chat-box {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
    }

    input {
      width: 80%;
      padding: 10px;
    }

    button {
      padding: 10px;
    }

    .user {
      background: #dbeafe;
      padding: 10px;
      border-radius: 10px;
      margin: 10px;
      text-align: right;
    }

    .bot {
      background: #f3f4f6;
      padding: 10px;
      border-radius: 10px;
      margin: 10px;
    }

  </style>

</head>

<body>

  <div class="chat-container">

    <h2>Hotel AI Chatbot</h2>

    <div id="chat-box"></div>

    <input
      type="text"
      id="user-input"
      placeholder="Tulis pesan..."
    >

    <button onclick="sendMessage()">
      Send
    </button>

  </div>

  <script>

    async function sendMessage() {

      const input = document.getElementById("user-input");

      const chatBox = document.getElementById("chat-box");

      const userMessage = input.value;

      if (!userMessage) return;

      chatBox.innerHTML += `
        <div class="user">${userMessage}</div>
      `;

      try {

        const response = await fetch(
          "http://localhost:3000/api/chat",
          {
            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify({
              conversation: [
                {
                  role: "user",
                  text: userMessage
                }
              ]
            })
          }
        );

        const data = await response.json();

        chatBox.innerHTML += `
          <div class="bot">
            ${data.result || "Maaf, chatbot sedang sibuk. Silakan coba lagi beberapa saat."}
          </div>
        `;

      } catch (error) {

        chatBox.innerHTML += `
          <div class="bot">
            Error connection
          </div>
        `;

      }

      input.value = "";

      chatBox.scrollTop = chatBox.scrollHeight;

    }

  </script>

</body>

</html>
