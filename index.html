<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luxury Hotel AI Assistant</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url('https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=1600&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .chat-wrapper {
      width: 430px;
      height: 760px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .top-bar {
      padding: 22px;
      background: rgba(0,0,0,0.25);
      color: white;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .top-bar h1 {
      font-size: 22px;
      font-weight: 700;
    }

    .top-bar p {
      margin-top: 6px;
      font-size: 13px;
      opacity: 0.8;
    }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    #chat-box::-webkit-scrollbar {
      width: 5px;
    }

    #chat-box::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
    }

    .message {
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      padding: 14px 18px;
      border-radius: 20px 20px 4px 20px;
      max-width: 78%;
      font-size: 14px;
      line-height: 1.5;
      box-shadow: 0 4px 15px rgba(0,114,255,0.35);
    }

    .bot {
      align-self: flex-start;
      background: rgba(255,255,255,0.95);
      color: #111;
      padding: 14px 18px;
      border-radius: 20px 20px 20px 4px;
      max-width: 78%;
      font-size: 14px;
      line-height: 1.6;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .timestamp {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      margin-top: 6px;
    }

    .input-area {
      padding: 18px;
      background: rgba(0,0,0,0.2);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #user-input {
      flex: 1;
      border: none;
      outline: none;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 14px;
      backdrop-filter: blur(10px);
    }

    #user-input::placeholder {
      color: rgba(255,255,255,0.7);
    }

    button {
      width: 56px;
      height: 56px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      font-size: 22px;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 4px 15px rgba(0,114,255,0.35);
    }

    button:hover {
      transform: scale(1.06);
    }

    .typing {
      display: inline-flex;
      gap: 5px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.95);
      border-radius: 20px 20px 20px 4px;
      width: fit-content;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: #555;
      border-radius: 50%;
      animation: bounce 1s infinite;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0.8);
        opacity: 0.5;
      }
      40% {
        transform: scale(1.2);
        opacity: 1;
      }
    }

  </style>
</head>

<body>

  <div class="chat-wrapper">

    <div class="top-bar">
      <h1>Luxury Hotel AI</h1>
      <p>24/7 Concierge Assistant</p>
    </div>

    <div id="chat-box"></div>

    <div class="input-area">

      <input
        type="text"
        id="user-input"
        placeholder="Tanyakan fasilitas hotel..."
      />

      <button onclick="sendMessage()">
        ➤
      </button>

    </div>

  </div>

  <script>

    const input = document.getElementById("user-input");

    input.addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });

    function getTime() {
      const now = new Date();
      return now.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    async function sendMessage() {

      const chatBox = document.getElementById("chat-box");

      const userMessage = input.value.trim();

      if (!userMessage) return;

      chatBox.innerHTML += `
        <div class="message">
          <div class="user">${userMessage}</div>
          <div class="timestamp">${getTime()}</div>
        </div>
      `;

      input.value = "";

      chatBox.innerHTML += `
        <div class="message" id="typing-box">
          <div class="typing">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      `;

      chatBox.scrollTop = chatBox.scrollHeight;

      try {

        const response = await fetch(
          "http://localhost:3000/api/chat",
          {
            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify({
              conversation: [
                {
                  role: "user",
                  text: userMessage
                }
              ]
            })
          }
        );

        const data = await response.json();

        document.getElementById("typing-box").remove();

        chatBox.innerHTML += `
          <div class="message">
            <div class="bot">
              ${data.result || "Maaf, chatbot sedang sibuk. Silakan coba lagi beberapa saat."}
            </div>
            <div class="timestamp">${getTime()}</div>
          </div>
        `;

      } catch (error) {

        document.getElementById("typing-box").remove();

        chatBox.innerHTML += `
          <div class="message">
            <div class="bot">
              Koneksi ke server gagal.
            </div>
            <div class="timestamp">${getTime()}</div>
          </div>
        `;

      }

      chatBox.scrollTop = chatBox.scrollHeight;

    }

  </script>

</body>
</html>
